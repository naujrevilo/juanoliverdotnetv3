<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      .title { font-family: 'Inter', sans-serif; font-size: 64px; font-weight: 800; fill: #ffffff; }
      .subtitle { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 400; fill: #bfdbfe; font-style: italic; }
      .meta { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 500; fill: #9ca3af; }
      .tag { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; fill: #00a8cc; }
    </style>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1f20;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#252527;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="galaxyGlow" cx="80%" cy="20%">
      <stop offset="0%" style="stop-color:#007acc;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Fondo base VS Code dark -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Efecto galaxia -->
  <rect width="1200" height="630" fill="url(#galaxyGlow)"/>
  
  <!-- Líneas decorativas -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#3a3a3c" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="530" x2="1200" y2="530" stroke="#3a3a3c" stroke-width="1" opacity="0.2"/>
  
  <!-- Círculos decorativos (espaciales) -->
  <g opacity="0.15" filter="drop-shadow(0 0 20px rgba(0, 168, 204, 0.3))">
    <circle cx="120" cy="90" r="50" fill="none" stroke="#007acc" stroke-width="2"/>
    <circle cx="120" cy="90" r="40" fill="none" stroke="#007acc" stroke-width="1"/>
  </g>
  
  <g opacity="0.12" filter="drop-shadow(0 0 25px rgba(0, 168, 204, 0.2))">
    <circle cx="1080" cy="540" r="65" fill="none" stroke="#00a8cc" stroke-width="2"/>
  </g>
  
  <!-- Iconografía de código (representación Rust) -->
  <g opacity="0.1">
    <text x="80" y="350" font-family="monospace" font-size="100" fill="#007acc" font-weight="bold">&lt;/&gt;</text>
  </g>
  
  <!-- Contenido principal -->
  <g>
    <!-- Badge superior -->
    <text x="600" y="65" text-anchor="middle" class="tag">✦ BLOG JUAN OLIVER ✦</text>
    
    <!-- Título principal -->
    <text x="600" y="180" text-anchor="middle" class="title">Interstellar Writer</text>
    
    <!-- Subtítulo -->
    <text x="600" y="240" text-anchor="middle" class="subtitle">Tu compañero galáctico para MD/MDX</text>
    
    <!-- Línea separadora -->
    <g opacity="0.6">
      <rect x="300" y="280" width="600" height="2" fill="#007acc" rx="1"/>
    </g>
    
    <!-- Metadata -->
    <text x="600" y="350" text-anchor="middle" class="meta">
      Editor de escritorio • Construido en Rust
    </text>
    
    <!-- Tags/Stack -->
    <text x="600" y="410" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" fill="#6b7280">
      Rust • egui • Astro • MDX • Git Integration
    </text>
    
    <!-- Lectura esperada -->
    <text x="600" y="480" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#4b5563" font-style="italic">
      Una aventura en desarrollo de herramientas nativas
    </text>
  </g>
  
  <!-- Barra lateral de acento -->
  <rect x="1192" y="0" width="8" height="630" fill="#007acc"/>
</svg>
